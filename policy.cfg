# Erelang Security Policy
# This policy file explicitly allows all built-ins (default_deny = false).
# You can tighten later by setting default_deny=true and listing allow= entries.
# Supported keys:
#   default_deny=true|false
#   allow=comma,separated,builtins
#   deny=comma,separated,builtins
#   max_threads=NUMBER
#   max_list_items=NUMBER   (soft guidance only currently)
#   suggest_variable_in_quotes=true|false

default_deny=false
# Example (leave commented):
# allow=now_ms,now_iso,env,rand_int
# deny=exec,run_file,run_bat

# Quotas (adjust as needed)
max_threads=32
max_list_items=300000
suggest_variable_in_quotes=false # Buggy
